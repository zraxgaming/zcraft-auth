# Auth proxy config

general:
  prefix: "[Auth] "

  # Seconds before unauthenticated players are kicked.
  # 0 disables the kick.
  login-timeout: 0
  register-timeout: 0

# Optional waiting location for auth/lobby servers that use the legacy Paper auth jar.
# The proxy/backend pair does not need this.
location:
  enabled: true
  world: world
  x: 0.0
  y: 64.0
  z: 0.0

database:
  # sqlite | mysql | mariadb | postgresql
  type: sqlite

  sqlite:
    file: auth.db

  # Used only when type is mysql, mariadb, or postgresql.
  external:
    host: localhost
    port: 3306
    database: zcraft_auth
    username: root
    password: ""
    ssl: false
    table: zcraft_accounts

password:
  min-length: 5
  max-length: 64
  unsafe-passwords:
    - "password"
    - "123456"
    - "qwerty"
    - "minecraft"
    - "password123"

# Optional compatibility defaults for the old Paper auth jar.
# In the proxy/backend setup, same-IP players are unlimited by default.
antibot:
  max-per-ip: 0

restrictions:
  enabled: false
