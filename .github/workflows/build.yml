name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build Plugins
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build proxy plugin
        run: mvn -B -DskipTests clean package -Pproxy

      - name: Keep proxy artifact
        run: |
          mkdir -p artifacts
          cp target/Auth-Proxy-*.jar artifacts/

      - name: Build backend plugin variants
        shell: bash
        run: |
          for name in \
            Auth-Backend-SpigotLegacy \
            Auth-Backend-Spigot \
            Auth-Backend-Paper \
            Auth-Backend-Folia
          do
            mvn -B -DskipTests clean package -Pbackend -Dbackend.finalName="$name-1.0.0"
            cp target/"$name-1.0.0".jar artifacts/
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Auth-Plugins
          path: artifacts/*.jar
          if-no-files-found: error
