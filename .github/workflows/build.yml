name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    name: Build Plugins
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build proxy plugin
        run: mvn -B -DskipTests clean package -Pproxy

      - name: Keep proxy artifact
        run: |
          mkdir -p artifacts
          cp target/Auth-Proxy-*.jar artifacts/

      - name: Build backend plugin
        run: mvn -B -DskipTests clean package -Pbackend

      - name: Keep backend artifact
        run: cp target/Auth-Backend-*.jar artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Auth-Plugins
          path: artifacts/*.jar
          if-no-files-found: error
